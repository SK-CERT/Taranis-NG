<!DOCTYPE html>
<html lang="cs">
    <head>
        {% set page_title %}{% block title %}{% endblock title %}{% endset %}
        <title>
            {{- page_title -}}
        </title>
        <link rel="icon"
              type="image/x-icon"
              href="{{ images['favicon'] }}">
        <link rel="alternate"
              type="application/rss+xml"
              title="{{ metadata['rss_name'] }} RSS"
              href="{{ hostname }}/feed">

        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
              rel="stylesheet"
              integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
              crossorigin="anonymous">

        <!-- Material Design Icons -->
        <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css"
              rel="stylesheet"
              crossorigin="anonymous">

        <!-- Custom CSS -->
        <link rel="stylesheet"
              href="{{ url_for('static', filename='styles.css') }}">

        <meta name="description"
              content="{{ metadata['meta_description'] }}">
        <meta name="keywords"
              content="{{ metadata['meta_keywords'] }}">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <meta name="color-scheme" content="light dark">

            <script>
                  (function() {
                        const darkModeQuery = window.matchMedia("(prefers-color-scheme: dark)");

                        function applyTheme(eventOrList) {
                              const isDark = typeof eventOrList.matches === "boolean"
                                    ? eventOrList.matches
                                    : darkModeQuery.matches;
                              document.documentElement.setAttribute("data-bs-theme", isDark ? "dark" : "light");
                        }

                        applyTheme(darkModeQuery);

                        if (typeof darkModeQuery.addEventListener === "function") {
                              darkModeQuery.addEventListener("change", applyTheme);
                        } else if (typeof darkModeQuery.addListener === "function") {
                              darkModeQuery.addListener(applyTheme);
                        }
                  })();
            </script>

        <!-- Tags for social networks (e.g. Mastodon) -->
        {# djlint:off H011 #}
        <meta property="og:title" content="{{- page_title -}}">
        <meta property="og:description" content="{{ metadata['meta_description'] }}">
        <meta property="og:image" content="{{ images['preview'] }}">
        <meta property="og:url" content="{{ current_url }}">
        <meta name="twitter:image:src" content="{{ images['preview'] }}">
        {# djlint:off H011 #}
    </head>
    <body>
        <main>
            {%- block content %}
            {% endblock content %}
        </main>

        <!-- Bootstrap Javascripts -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        {% block javascript %}
        {% endblock javascript %}
    </body>
</html>
