<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex, notranslate" />
    <meta name="theme-color" content="#3f92dd" />
    <meta name="description" content="Taranis NG - Open-Source Intelligence Platform" />
    <meta name="keywords" content="OSINT, intelligence, analysis, threat intelligence" />
    <link rel="icon" href="favicon.ico">
    <link rel="manifest" href="manifest.json" id="manifest-link">
    <title>Taranis NG</title>
    <script>
      // Detect browser language and set correct manifest
      (function() {
        var lang = ((navigator.language || 'en').split('-')[0] || 'en').toLowerCase();
        var manifestLink = document.getElementById('manifest-link');
        var localizedManifest = 'manifest-' + lang + '.json';

        fetch(localizedManifest, { method: 'HEAD' })
          .then(function(response) {
            manifestLink.href = response.ok ? localizedManifest : 'manifest-en.json';
          })
          .catch(function() {
            manifestLink.href = 'manifest-en.json';
          });
      })();
    </script>
     <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,500,700,900">
    <!--<link href="https://fonts.googleapis.com/css?family=Kanit&display=swap" rel="stylesheet"> -->
    <link href="https://fonts.googleapis.com/css?family=Rajdhani:300,400,500,600,700&display=swap" rel="stylesheet">
  </head>
  <body class="base">
    <noscript>
      <strong>We're sorry but Taranis NG doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
