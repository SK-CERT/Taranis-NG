repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/djlint/djLint
    rev: v1.40.4
    hooks:
      - id: djlint
        files: "^(src/presenters/templates/.*\\.(html|jinja|j2)|src/gui-v3/index\\.html)$"
        args: ["--ignore=H021"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
        exclude: '.*\.(example|svg|yml|j2)$'
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: local
    hooks:
      - id: check-tool-versions-lockstep
        name: Dev tool version lockstep (pyproject / pre-commit / CI)
        entry: python3 scripts/check_tool_versions.py
        language: system
        pass_filenames: false
        always_run: true
      - id: check-version-lockstep
        name: Release version lockstep (VERSION.md / pyprojects / package.json)
        entry: python3 scripts/bump_version.py --check
        language: system
        pass_filenames: false
        always_run: true
      - id: gui3-precommit
        name: gui3-precommit
        entry: node src/gui-v3/scripts/precommit.cjs
        language: system
        pass_filenames: false
        always_run: true
