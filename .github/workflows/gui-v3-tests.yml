name: GUI-v3 Tests

on:
  push:
    branches: [vue3, main]
    paths:
      - 'src/gui-v3/**'
      - '.github/workflows/gui-v3-tests.yml'
  pull_request:
    branches: [vue3, main]
    paths:
      - 'src/gui-v3/**'
      - '.github/workflows/gui-v3-tests.yml'

defaults:
  run:
    working-directory: src/gui-v3

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/gui-v3/package-lock.json
      - run: npm ci
      - run: npm run lint:check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/gui-v3/package-lock.json
      - run: npm ci
      # prebuild generates git-info.json needed by DashboardView imports
      - run: node scripts/update-version.cjs
      - run: npm run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: src/gui-v3/coverage/
          retention-days: 14

  e2e-tests:
    name: E2E Tests (${{ matrix.browser }})
    if: false # Temporarily disabled
    runs-on: ubuntu-latest
    needs: unit-tests
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/gui-v3/package-lock.json
      - run: npm ci
      - run: node scripts/update-version.cjs
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - run: npx playwright test --project=${{ matrix.browser }}
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: src/gui-v3/playwright-report/
          retention-days: 14
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: src/gui-v3/test-results/
          retention-days: 7
