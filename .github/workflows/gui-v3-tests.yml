name: GUI-v3 Tests

on:
  push:
    branches: [vue3, main]
    paths:
      - 'src/gui-v3/**'
      - '.github/workflows/gui-v3-tests.yml'
  pull_request:
    branches: [vue3, main]
    paths:
      - 'src/gui-v3/**'
      - '.github/workflows/gui-v3-tests.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    working-directory: src/gui-v3

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/gui-v3/package-lock.json
      - run: npm ci
      - run: npm run lint:check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/gui-v3/package-lock.json
      - run: npm ci
      # prebuild generates git-info.json needed by DashboardView imports
      - run: node scripts/update-version.cjs
      - run: npm run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: src/gui-v3/coverage/
          retention-days: 14

  e2e-tests:
    name: E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: unit-tests
    strategy:
      fail-fast: false
      matrix:
        # Chromium + Firefox only: webkit's cumulative-load timeouts against
        # the single shared backend (workers:1) make it too flaky to gate on.
        # The mfa-enrollment.spec.js tests self-skip on non-chromium.
        browser: [chromium, firefox]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/gui-v3/package-lock.json
      - run: npm ci
      # Generate git-info.json BEFORE the Vite dev server starts: DashboardView.vue
      # does `import gitMeta from '../../../git-info.json'` at module load, and the
      # file is gitignored — without this step the dev server crashes on import
      # resolution and every test fails with a webServer launch error. Same reason
      # the unit-tests job runs this step.
      - run: node scripts/update-version.cjs
      # Always install chromium alongside the matrix browser: the `setup` project
      # in playwright.config.js (which seeds the E2E data and is a dependency of
      # every browser project) runs in Desktop Chrome, so even the firefox job
      # needs chromium's chrome-headless-shell to run setup.
      - run: npx playwright install --with-deps chromium ${{ matrix.browser }}
      # The Playwright webServer boots scripts/test-setup.py, which runs
      # `docker compose up -d --build` of postgres/redis/core/collectors/presenters/
      # publishers on the E2E compose project (taranis-e2e). On a cold GitHub runner
      # with no Docker layer cache, the Dockerfile.core build (Python uv/pip
      # installs) can take several minutes; playwright.config.js sets
      # `webServer.timeout: process.env.CI ? 600_000 : 120_000` so the cold build
      # completes before Playwright times out waiting for the isalive probe. CI
      # retries (retries: process.env.CI ? 2 : 0) absorb the residual load-induced
      # flakiness from running the whole serial suite against one shared backend.
      - run: npx playwright test --project=${{ matrix.browser }}
        env:
          CI: 'true'
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: src/gui-v3/playwright-report/
          retention-days: 14
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: src/gui-v3/test-results/
          retention-days: 7
